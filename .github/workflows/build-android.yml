name: Build Android TWA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'artifacts/lugazi/**'
      - 'lib/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'

jobs:
  build:
    name: Build and sign APK + AAB
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Restore keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/signing.keystore

      - name: Create TWA manifest
        run: |
          mkdir -p twa-build
          cat > twa-build/twa-manifest.json << EOF
          {
            "packageId": "app.web.lugazi_system1.twa",
            "host": "lugazi-system1.web.app",
            "name": "DC Lugazi",
            "launcherName": "DC Lugazi",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#6D1F3C",
            "backgroundColor": "#ffffff",
            "navigationColor": "#6D1F3C",
            "navigationColorDark": "#6D1F3C",
            "navigationDividerColor": "#6D1F3C",
            "navigationDividerColorDark": "#6D1F3C",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://lugazi-system1.web.app/icons/icon-512x512.png",
            "maskableIconUrl": "https://lugazi-system1.web.app/icons/icon-512x512-maskable.png",
            "monochromeIconUrl": "",
            "splashScreenFadeOutDuration": 300,
            "signing": {
              "keystore": "/tmp/signing.keystore",
              "alias": "${{ secrets.KEY_ALIAS }}",
              "keyPassword": "${{ secrets.KEY_PASSWORD }}",
              "storePassword": "${{ secrets.KEYSTORE_PASSWORD }}"
            },
            "appVersionCode": ${{ github.run_number }},
            "appVersionName": "1.0.${{ github.run_number }}",
            "shortcuts": [
              {
                "name": "Members",
                "shortName": "Members",
                "url": "/members",
                "icons": [{ "src": "https://lugazi-system1.web.app/icons/icon-96x96.png", "sizes": "96x96" }]
              },
              {
                "name": "Attendance",
                "shortName": "Attendance",
                "url": "/attendance",
                "icons": [{ "src": "https://lugazi-system1.web.app/icons/icon-96x96.png", "sizes": "96x96" }]
              },
              {
                "name": "Finance",
                "shortName": "Finance",
                "url": "/finance",
                "icons": [{ "src": "https://lugazi-system1.web.app/icons/icon-96x96.png", "sizes": "96x96" }]
              }
            ],
            "generatorApp": "pwa-builder",
            "webManifestUrl": "https://lugazi-system1.web.app/manifest.webmanifest",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://lugazi-system1.web.app/",
            "minSdkVersion": 21,
            "sdkVersion": 35
          }
          EOF

      - name: Build APK and AAB
        working-directory: twa-build
        run: bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DC-Lugazi-APK
          path: twa-build/app-release-signed.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: DC-Lugazi-AAB
          path: twa-build/app-release.aab
          retention-days: 30
