name: Deploy Frontend to Firebase Hosting

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'artifacts/lugazi/**'
      - 'lib/api-client-react/**'
      - 'lib/api-zod/**'
      - 'lib/api-spec/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Authenticate and get access token
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          token_format: 'access_token'
          access_token_scopes: 'https://www.googleapis.com/auth/cloud-platform,https://www.googleapis.com/auth/firebase'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts  # M6 fix: enforce lockfile integrity

      - name: Build API client
        run: pnpm --filter @workspace/api-client-react run build

      - name: Build frontend
        run: pnpm --filter @workspace/lugazi run build
        env:
          NODE_ENV: production
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy to Firebase Hosting
        run: |
          cd artifacts/lugazi
          npx firebase-tools deploy --only hosting --project lugazi-system1 2>&1 | tee /tmp/firebase-out.txt
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ] && grep -q "is the current active version" /tmp/firebase-out.txt; then
            echo "Version already active — site is up to date."
            exit 0
          fi
          exit $EXIT
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
