name: Deploy Frontend to Firebase Hosting

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'artifacts/lugazi/**'
      - 'lib/api-client-react/**'
      - 'lib/api-zod/**'
      - 'lib/api-spec/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Write service account credentials
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$SERVICE_ACCOUNT_JSON" > /tmp/firebase-sa.json
          echo "Credential file size: $(wc -c < /tmp/firebase-sa.json) bytes"
          node -e "const j=JSON.parse(require('fs').readFileSync('/tmp/firebase-sa.json','utf8')); console.log('type:', j.type, '| project:', j.project_id, '| email:', j.client_email)"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Build API client
        run: pnpm --filter @workspace/api-client-react run build

      - name: Build frontend
        run: pnpm --filter @workspace/lugazi run build
        env:
          NODE_ENV: production
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy to Firebase Hosting
        run: |
          cd artifacts/lugazi
          npx firebase-tools@13.29.0 deploy --only hosting --project lugazi-system1
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
