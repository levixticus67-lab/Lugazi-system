name: Keep Backend Alive

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping API Health
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend healthz
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.VITE_API_BASE_URL }}/api/healthz")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: backend returned $STATUS"
          fi
