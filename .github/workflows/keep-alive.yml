name: Keep Backend Alive

on:
  schedule:
    # Every 10 minutes — gives a 5-minute safety buffer before Render's 15-minute sleep window.
    # The server also self-pings via RENDER_EXTERNAL_URL as the primary keep-alive;
    # this workflow is a backup in case the process restarts.
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping API Health
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend healthz
        run: |
          URL="${{ secrets.RENDER_API_URL }}"
          if [ -z "$URL" ]; then
            echo "RENDER_API_URL secret is not set — skipping ping"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL/api/healthz")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: backend returned HTTP $STATUS"
          fi
