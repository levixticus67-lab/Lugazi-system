# DCL Lugazi Android build pipeline
workflows:
  android-capacitor-build:
    name: Build Capacitor Android APK
    max_build_duration: 45
    instance_type: mac_mini_m1
    environment:
      node: 20
      java: 17
      groups:
        - lugazi_secrets
      vars:
        COREPACK_ENABLE_STRICT: "0"
    triggering:
      events:
        - push
    scripts:
      - name: Activate pnpm
        script: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
          pnpm --version

      - name: Install Dependencies
        script: |
          pnpm install --no-frozen-lockfile

      - name: Build Shared Libraries
        script: |
          pnpm run typecheck:libs
          cd lib/api-client-react
          npm install -D @esbuild/darwin-arm64
          node build.mjs
          cd ../..

      - name: Inject build timestamp
        script: |
          echo "VITE_BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> artifacts/lugazi/.env
          echo "VITE_BUILD_NUMBER=${CM_BUILD_NUMBER}" >> artifacts/lugazi/.env

      - name: Build Web Application
        script: |
          NODE_ENV=production pnpm --filter @workspace/lugazi run build

      - name: Setup & Sync Capacitor
        script: |
          cd artifacts/lugazi
          pnpm exec cap add android 2>/dev/null || true
          # Inject Firebase google-services.json from Codemagic environment secret
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            mkdir -p android/app
            printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "google-services.json written"
          else
            echo "GOOGLE_SERVICES_JSON not set - FCM push notifications disabled in this build"
          fi
          echo "" | base64 --decode > /tmp/patch_manifest.py
          python3 /tmp/patch_manifest.py
          # Inject Firebase default notification icon so pushes show the app icon
          echo "" | base64 --decode > /tmp/patch_notif_icon.py
          python3 /tmp/patch_notif_icon.py
          pip3 install pillow --quiet
          echo "" | base64 --decode > /tmp/gen_icons.py
          python3 /tmp/gen_icons.py
          pnpm exec cap sync android

      - name: Decode keystore
        script: |
          # KEYSTORE_FILE is the base64-encoded .jks stored in the lugazi_secrets group.
          # We decode it to a temp path that Gradle reads at build time — never written
          # to the repo or any build output.
          if [ -z "$KEYSTORE_FILE" ]; then
            echo "ERROR: KEYSTORE_FILE env var is not set in the lugazi_secrets group." >&2
            exit 1
          fi
          echo "$KEYSTORE_FILE" | base64 --decode > /tmp/dcl-lugazi-release.jks
          # Sanity-check: keytool can list the alias we expect
          keytool -list \
            -keystore /tmp/dcl-lugazi-release.jks \
            -storepass "$KEYSTORE_STORE_PASSWORD" \
            -alias "$KEYSTORE_KEY_ALIAS" \
            -noprompt
          echo "Keystore decoded and verified."

      - name: Build Android Release APK
        script: |
          cd artifacts/lugazi/android
          chmod +x ./gradlew
          # Signing credentials are passed as Gradle properties so they never
          # appear in build.gradle (which lives in the generated android/ dir).
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=/tmp/dcl-lugazi-release.jks \
            -Pandroid.injected.signing.store.password="$KEYSTORE_STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEYSTORE_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEYSTORE_KEY_PASSWORD" \
            --no-daemon

      - name: Publish to GitHub Releases
        script: |
          if [ -n "$GH_RELEASE_TOKEN" ]; then
            APK=$(find artifacts/lugazi/android/app/build/outputs/apk/release -name '*.apk' | head -1)
            REPO="levixticus67-lab/Lugazi-system"
            TAG="latest-build"
            # Remove any existing release + tag so we always have a fresh "latest-build"
            RELEASE_ID=$(curl -sf -H "Authorization: token $GH_RELEASE_TOKEN" \
              "https://api.github.com/repos/$REPO/releases/tags/$TAG" | \
              python3 -c "import sys,json; r=json.load(sys.stdin); print(r.get('id',''))" 2>/dev/null || true)
            if [ -n "$RELEASE_ID" ]; then
              curl -s -X DELETE -H "Authorization: token $GH_RELEASE_TOKEN" \
                "https://api.github.com/repos/$REPO/releases/$RELEASE_ID"
            fi
            curl -s -X DELETE -H "Authorization: token $GH_RELEASE_TOKEN" \
              "https://api.github.com/repos/$REPO/git/refs/tags/$TAG" || true
            # Create a fresh release — include build number in the name so UpdateChecker can compare
            UPLOAD_URL=$(curl -s -X POST \
              -H "Authorization: token $GH_RELEASE_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$REPO/releases" \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"DC Lugazi Android App #${CM_BUILD_NUMBER}\",\"body\":\"Latest build — $(date +%Y-%m-%d)\\nbuild: ${CM_BUILD_NUMBER}\",\"draft\":false,\"prerelease\":false}" | \
              python3 -c "import sys,json; r=json.load(sys.stdin); print(r['upload_url'].split('{')[0])")
            # Upload as DCLugazi.apk (stable filename the banner links to)
            curl -s -X POST \
              -H "Authorization: token $GH_RELEASE_TOKEN" \
              -H "Content-Type: application/vnd.android.package-archive" \
              "${UPLOAD_URL}?name=DCLugazi.apk" \
              --data-binary @"$APK"
            echo "Published: https://github.com/$REPO/releases/download/$TAG/DCLugazi.apk"
          else
            echo "GH_RELEASE_TOKEN not set — skipping GitHub Release publish"
          fi

    artifacts:
      - artifacts/lugazi/android/app/build/outputs/apk/release/*.apk
