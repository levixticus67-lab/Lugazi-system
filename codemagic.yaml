workflows:
  android-capacitor-build:
    name: Build Capacitor Android APK
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      node: 20
    triggering:
      events:
        - push
    scripts:
      - name: Enable pnpm via corepack
        script: |
          # pnpm ships pre-installed on Codemagic; corepack activates it cleanly
          # without conflicting with the machine's packageManager yarn config
          corepack enable pnpm
          pnpm --version

      - name: Install Dependencies
        script: |
          pnpm install --frozen-lockfile

      - name: Build Web Application
        script: |
          pnpm --filter @workspace/lugazi run build

      - name: Sync Capacitor Android
        script: |
          cd artifacts/lugazi
          npx cap sync android

      - name: Build Android Debug APK
        script: |
          cd artifacts/lugazi/android
          chmod +x ./gradlew
          ./gradlew assembleDebug

    artifacts:
      - artifacts/lugazi/android/app/build/outputs/apk/debug/*.apk
