workflows:
  android-capacitor-build:
    name: Build Capacitor Android APK
    max_build_duration: 45
    # Linux x64: Android doesn't need macOS, and linux-x64 esbuild is available.
    # mac_mini_m1 was failing because pnpm-workspace.yaml excludes darwin-arm64
    # esbuild binaries (Replit runs Linux-only), making lib builds impossible on Mac.
    instance_type: linux_x2
    environment:
      node: 20
      java: 17
      vars:
        COREPACK_ENABLE_STRICT: "0"
    triggering:
      events:
        - push
    scripts:
      - name: Activate pnpm
        script: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
          pnpm --version

      - name: Install Dependencies
        script: |
          pnpm install --no-frozen-lockfile

      - name: Build Shared Libraries
        script: |
          # 1. tsc --build: emits .d.ts declarations for all composite lib/* packages
          pnpm run typecheck:libs
          # 2. Build api-client-react JS bundle (node build.mjs → dist/index.mjs)
          #    This requires esbuild; works on linux_x2 since linux-x64 is not excluded
          pnpm --filter @workspace/api-client-react run build

      - name: Build Web Application
        script: |
          pnpm --filter @workspace/lugazi run build

      - name: Setup & Sync Capacitor
        script: |
          cd artifacts/lugazi
          pnpm exec cap add android 2>/dev/null || true
          pnpm exec cap sync android

      - name: Build Android Debug APK
        script: |
          cd artifacts/lugazi/android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - artifacts/lugazi/android/app/build/outputs/apk/debug/*.apk
