workflows:
  android-capacitor-build:
    name: Build Capacitor Android APK
    max_build_duration: 45
    # mac_mini_m1 is the free-tier instance on Codemagic.
    # linux_x2 requires a paid plan.
    instance_type: mac_mini_m1
    environment:
      node: 20
      java: 17
      groups:
        # Create this group in Codemagic → Teams → Global variables & secrets
        # and add VITE_API_BASE_URL = https://<your-render-app>.onrender.com
        - lugazi_secrets
      vars:
        COREPACK_ENABLE_STRICT: "0"
    triggering:
      events:
        - push
    scripts:
      - name: Activate pnpm
        script: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
          pnpm --version

      - name: Install Dependencies
        script: |
          pnpm install --no-frozen-lockfile

      - name: Build Shared Libraries
        script: |
          # 1. tsc --build: emits .d.ts declarations for composite lib/* packages
          pnpm run typecheck:libs
          # 2. Build api-client-react JS bundle → dist/index.mjs
          #    pnpm-workspace.yaml overrides exclude @esbuild/darwin-arm64 (Replit is Linux-only),
          #    so we install the darwin binary via npm (which ignores pnpm workspace overrides)
          #    inside the package dir before running node build.mjs.
          cd lib/api-client-react
          npm install -D @esbuild/darwin-arm64
          node build.mjs
          cd ../..

      - name: Build Web Application
        script: |
          NODE_ENV=production pnpm --filter @workspace/lugazi run build

      - name: Setup & Sync Capacitor
        script: |
          cd artifacts/lugazi
          pnpm exec cap add android 2>/dev/null || true
          # Patch AndroidManifest.xml to register dclugazi:// scheme so Android
          # hands the Google OAuth callback back to the app (deep link).
          python3 - <<'PYEOF'
import sys
manifest = 'android/app/src/main/AndroidManifest.xml'
try:
    with open(manifest, 'r') as f:
        content = f.read()
    intent_filter = """
        <intent-filter>
            <action android:name="android.intent.action.VIEW"/>
            <category android:name="android.intent.category.DEFAULT"/>
            <category android:name="android.intent.category.BROWSABLE"/>
            <data android:scheme="dclugazi"/>
        </intent-filter>"""
    if 'dclugazi' not in content:
        content = content.replace('</activity>', intent_filter + '\n    </activity>', 1)
        with open(manifest, 'w') as f:
            f.write(content)
        print('Patched AndroidManifest.xml with dclugazi:// deep link scheme')
    else:
        print('AndroidManifest.xml already has dclugazi:// scheme')
except Exception as e:
    print(f'Warning: could not patch manifest: {e}', file=sys.stderr)
PYEOF
          pnpm exec cap sync android

      - name: Build Android Debug APK
        script: |
          cd artifacts/lugazi/android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - artifacts/lugazi/android/app/build/outputs/apk/debug/*.apk
