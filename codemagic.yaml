workflows:
  android-capacitor-build:
    name: Build Capacitor Android APK
    max_build_duration: 45
    instance_type: mac_mini_m1
    environment:
      node: 20
      java: 17
      vars:
        # Stops corepack from blocking pnpm when it finds the machine-level
        # "packageManager": "yarn" in /Users/builder/package.json.
        # Our own package.json now declares "packageManager": "pnpm@9.15.0"
        # which takes precedence, but this env var is a belt-and-suspenders fix.
        COREPACK_ENABLE_STRICT: "0"
    triggering:
      events:
        - push
    scripts:
      - name: Activate pnpm
        script: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
          pnpm --version

      - name: Install Dependencies
        script: |
          pnpm install --no-frozen-lockfile

      - name: Build Web Application
        script: |
          pnpm --filter @workspace/lugazi run build

      - name: Setup & Sync Capacitor
        script: |
          cd artifacts/lugazi
          pnpm exec cap add android 2>/dev/null || true
          pnpm exec cap sync android

      - name: Build Android Debug APK
        script: |
          cd artifacts/lugazi/android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - artifacts/lugazi/android/app/build/outputs/apk/debug/*.apk
